<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexTrade - Órdenes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/trade.css">
  <style>
    .orders-page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg-primary);
    }
    .orders-header {
      height: var(--header-height);
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 24px;
    }
    .orders-header .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent-yellow);
    }
    .orders-header .nav-links {
      display: flex;
      gap: 16px;
    }
    .orders-header .nav-links a {
      color: var(--text-secondary);
      font-size: 13px;
      padding: 4px 0;
    }
    .orders-header .nav-links a:hover,
    .orders-header .nav-links a.active {
      color: var(--text-primary);
      text-decoration: none;
      border-bottom: 2px solid var(--accent-yellow);
    }
    .orders-content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }
    .orders-content h2 {
      margin-bottom: 16px;
      font-size: 18px;
    }
    .orders-filter {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .orders-filter select {
      padding: 6px 12px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="orders-page">
    <header class="orders-header">
      <div class="logo">NexTrade</div>
      <nav class="nav-links">
        <a href="/trade.html">Trading</a>
        <a href="/wallet.html">Billetera</a>
        <a href="/orders.html" class="active">Órdenes</a>
      </nav>
    </header>

    <div class="orders-content">
      <h2>Historial de Órdenes</h2>
      <div class="orders-filter">
        <select id="filter-pair">
          <option value="">Todos los pares</option>
        </select>
        <select id="filter-status">
          <option value="">Todos los estados</option>
          <option value="filled">Completadas</option>
          <option value="cancelled">Canceladas</option>
          <option value="pending">Pendientes</option>
          <option value="partial">Parciales</option>
        </select>
      </div>
      <table class="orders-table">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Par</th>
            <th>Tipo</th>
            <th>Lado</th>
            <th>Precio</th>
            <th>Cantidad</th>
            <th>Completado</th>
            <th>Total</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="orders-history-body">
          <tr><td colspan="9" style="text-align:center;padding:24px;color:var(--text-muted);">Cargando órdenes...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="/js/socket.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/orders.js"></script>
  <script>
    function formatPrice(price) {
      if (price >= 1000) return parseFloat(price).toFixed(2);
      if (price >= 1) return parseFloat(price).toFixed(4);
      return parseFloat(price).toFixed(8);
    }

    function formatAmount(amount) {
      return parseFloat(amount).toFixed(8);
    }

    async function init() {
      const pairSelect = document.getElementById('filter-pair');
      try {
        const resp = await fetch('/api/market/pairs');
        const data = await resp.json();
        (data.active || data.all || []).forEach(pair => {
          const option = document.createElement('option');
          option.value = pair;
          option.textContent = pair;
          pairSelect.appendChild(option);
        });
      } catch (e) {
        const fallback = ['BTC/USDT','ETH/USDT','BNB/USDT','SOL/USDT','XRP/USDT','ADA/USDT','DOGE/USDT','AVAX/USDT','DOT/USDT','MATIC/USDT','LINK/USDT','UNI/USDT','ATOM/USDT','LTC/USDT','NEAR/USDT','APT/USDT','ARB/USDT','OP/USDT','FIL/USDT','INJ/USDT'];
        fallback.forEach(pair => {
          const option = document.createElement('option');
          option.value = pair;
          option.textContent = pair;
          pairSelect.appendChild(option);
        });
      }

      await loadOrders();

      document.getElementById('filter-pair').addEventListener('change', loadOrders);
      document.getElementById('filter-status').addEventListener('change', loadOrders);
    }

    async function loadOrders() {
      const pair = document.getElementById('filter-pair').value;
      const status = document.getElementById('filter-status').value;

      try {
        const data = await API.getOrderHistory(pair || null, 1, 100);
        renderOrders(data.orders, status);
      } catch (error) {
        document.getElementById('orders-history-body').innerHTML =
          `<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--accent-sell);">Error: ${error.message}</td></tr>`;
      }
    }

    function renderOrders(orders, statusFilter) {
      const container = document.getElementById('orders-history-body');

      let filtered = orders;
      if (statusFilter) {
        filtered = orders.filter(o => o.status === statusFilter);
      }

      if (!filtered || filtered.length === 0) {
        container.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--text-muted);">No hay órdenes.</td></tr>';
        return;
      }

      let html = '';
      filtered.forEach(order => {
        const sideClass = order.side === 'buy' ? 'text-buy' : 'text-sell';
        const statusClass = order.status === 'filled' ? 'text-buy' : order.status === 'cancelled' ? 'text-sell' : 'text-yellow';
        const time = new Date(order.createdAt).toLocaleString('es-ES', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        const total = (parseFloat(order.price) * parseFloat(order.filled)).toFixed(2);

        html += `<tr>
          <td>${time}</td>
          <td>${order.pair}</td>
          <td style="text-transform:capitalize;">${order.type}</td>
          <td class="${sideClass}" style="text-transform:capitalize;">${order.side}</td>
          <td>${formatPrice(order.price)}</td>
          <td>${formatAmount(order.amount)}</td>
          <td>${formatAmount(order.filled)}</td>
          <td>${total}</td>
          <td class="${statusClass}" style="text-transform:capitalize;">${order.status}</td>
        </tr>`;
      });

      container.innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
