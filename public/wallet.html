<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexTrade - Billetera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/wallet.css">
</head>
<body>
  <div class="wallet-layout">
    <header class="wallet-header">
      <div class="logo">NexTrade</div>
      <nav class="nav-links">
        <a href="/trade.html">Trading</a>
        <a href="/wallet.html" class="active">Billetera</a>
        <a href="/orders.html">Órdenes</a>
      </nav>
    </header>

    <div class="wallet-content">
      <h2 style="margin-bottom:16px;font-size:18px;">Billetera</h2>

      <div class="wallet-summary">
        <div class="summary-card">
          <div class="label">Balance Total Estimado</div>
          <div class="value" id="total-balance">$0.00</div>
        </div>
        <div class="summary-card">
          <div class="label">Disponible</div>
          <div class="value" id="available-balance">$0.00</div>
        </div>
        <div class="summary-card">
          <div class="label">En Órdenes</div>
          <div class="value">$0.00</div>
        </div>
      </div>

      <div style="display:flex;gap:8px;margin-bottom:16px;">
        <button class="action-btn deposit" id="deposit-btn" style="padding:8px 24px;font-size:14px;">Depositar</button>
        <button class="action-btn withdraw" id="withdraw-btn" style="padding:8px 24px;font-size:14px;">Retirar</button>
      </div>

      <table class="balances-table">
        <thead>
          <tr>
            <th>Moneda</th>
            <th>Total</th>
            <th>Disponible</th>
            <th>En Órdenes</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="balances-body"></tbody>
      </table>
    </div>
  </div>

  <div class="modal-overlay" id="modal-overlay" style="display:none;">
    <div class="modal">
      <h3 id="modal-title">Depositar</h3>
      <div class="form-group">
        <label>Moneda</label>
        <select id="modal-currency" style="width:100%;padding:8px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);font-size:13px;"></select>
      </div>
      <div class="form-group">
        <label>Cantidad</label>
        <input type="number" id="modal-amount" placeholder="0.00" step="any">
      </div>
      <div class="form-group" id="address-group" style="display:none;">
        <label>Dirección</label>
        <input type="text" id="modal-address" placeholder="Dirección de destino">
      </div>
      <div class="modal-actions">
        <button class="cancel" id="modal-cancel">Cancelar</button>
        <button class="confirm" id="modal-confirm">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="/js/socket.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/wallet.js"></script>
</body>
</html>
